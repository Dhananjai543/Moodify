AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Moodify - Voice-to-Playlist Generator Backend

Globals:
  Function:
    Timeout: 90
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        SPOTIFY_CLIENT_ID: ""
        SPOTIFY_REDIRECT_URI: "http://127.0.0.1:5173/callback"
        BEDROCK_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"
        AWS_BEDROCK_REGION: "ap-south-1"

Resources:
  MoodifyApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: dev
      CorsConfiguration:
        AllowOrigins:
          - http://127.0.0.1:5173
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  HelloFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/hello.handler
      CodeUri: .
      Description: Health check endpoint
      Events:
        HelloApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref MoodifyApi
            Path: /hello
            Method: GET

  TokenExchangeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/auth.token_handler
      CodeUri: .
      Description: Exchange auth code for Spotify tokens
      Events:
        TokenApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref MoodifyApi
            Path: /auth/token
            Method: POST

  TokenRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/auth.refresh_handler
      CodeUri: .
      Description: Refresh Spotify access token
      Events:
        RefreshApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref MoodifyApi
            Path: /auth/refresh
            Method: POST

  AnalyzeMoodFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/mood.analyze_mood_handler
      CodeUri: .
      Description: Analyze mood via Amazon Bedrock
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "arn:aws:bedrock:*::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
      Events:
        AnalyzeMoodApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref MoodifyApi
            Path: /analyze-mood
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${MoodifyApi}.execute-api.${AWS::Region}.amazonaws.com/dev"
